script.postscript.error.title=Post-script Execution Error
script.help.title=💡 Script Usage Guide
script.help.intro=Pre-script executes before sending request, Post-script executes after receiving response. Write scripts in JavaScript with support for variables, assertions, and more.
script.help.features=✨ Key Features:\n\n📝 Auto-completion (Tab trigger)\n  • Type pm. then press Tab for quick API completion\n  • Press Tab after keywords for method suggestions\n  • Hover for detailed descriptions and parameters\n\n📚 Code Snippets\n  • Click "Code Snippets" button at bottom-right\n  • Browse templates by category\n  • Double-click or press Enter to insert\n  • Search function for quick access\n\n🔧 Core APIs:\n  • pm.environment - Environment variables\n  • pm.variables - Execution-scoped variables\n  • pm.iterationData - Read-only current CSV/JSON row\n  • pm.request - Request object (Pre-script)\n  • pm.response - Response object (Post-script)\n  • pm.test / pm.expect - Assertions & tests\n  • pm.cookies - Cookie management\n  • pm.kafka / pm.es - middleware query and assertions\n\n📦 Built-in Libraries:\n  • CryptoJS - Crypto library (AES, MD5, SHA256, etc.)\n  • Lodash (_) - Utility library\n  • Moment - Date/time handling\n\n📁 External scripts with require():\n  • Supports local absolute-path modules\n  • Supports ./ and ../ relative to the current workspace\n  • Remote modules are disabled by default and can be enabled in Settings -> Request Settings -> Script Loading\n
script.help.shortcuts=⌨️ Shortcuts:\n\n  Tab           Trigger auto-completion\n  Ctrl/Cmd+S    Save request\n  Ctrl/Cmd+/    Comment/Uncomment\n  Ctrl/Cmd+D    Delete line\n
script.help.examples=📖 Common Examples:\n\n1. Set environment variable\n   pm.environment.set('token', 'abc123');\n\n2. Get response data\n   var data = pm.response.json();\n   pm.environment.set('userId', data.id);\n\n3. Assertion test\n   pm.test('Status is 200', function() {\n       pm.response.to.have.status(200);\n   });\n\n4. Add dynamic header\n   pm.request.headers.add({\n       key: 'Authorization',\n       value: 'Bearer ' + pm.environment.get('token')\n   });\n   // Authorization priority: script-defined Authorization > existing request header > auth tab generated Authorization\n   // Removing Authorization does not disable auth tab; if no Authorization remains, the auth tab configuration is applied at send time\n\n5. Generate signature\n   var timestamp = Date.now();\n   var sign = CryptoJS.MD5(timestamp + 'secret').toString();\n   pm.environment.set('sign', sign);\n\n6. CSV / JSON data-driven access\n   // Use {{userId}} and {{token}} directly in URL/Header/Body\n   var userId = pm.iterationData.get('userId');\n   var token = pm.iterationData.get('token');\n   var compatUserId = pm.variables.get('userId'); // read-only compatibility access\n   pm.variables.set('currentUserId', userId || '');\n\n7. Kafka query assertion\n   var records = pm.kafka.poll({bootstrapServers:'localhost:9092',topic:'demo-topic',pollTimeoutMs:1000});\n   pm.test('kafka has records', function(){ pm.expect(records.length).to.be.above(0); });\n\n8. Elasticsearch query assertion\n   var esResp = pm.es.request({baseUrl:'http://localhost:9200',method:'GET',path:'/orders/_search',body:JSON.stringify({query:{match_all:{}},size:1})});\n   pm.test('es status is 200', function(){ pm.expect(esResp.code).to.equal(200); });\n\n9. Local require() test\n   // Works directly when the current workspace points to the repo root\n   var localDemo = require('./docs/examples/js-require/local-parent.js');\n   console.log(localDemo.describe('easy-postman'));\n\n10. Remote require() test\n   // First enable remote scripts in Settings -> Request Settings -> Script Loading\n   var dayjs = require('https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js');\n   console.log(dayjs('2026-03-27').add(1, 'day').format('YYYY-MM-DD'));\n
