csv.usage_text=• Double-click a cell to edit content directly\n• Uses standard comma-separated CSV only; semicolon and tab delimiters are not supported\n• Single-column large text values such as Cookie can be stored in one quoted field\n• Supports three usage methods: {{column_name}} placeholders, pm.iterationData.get('column_name'), and pm.variables.get('column_name')\n• pm.iterationData and the pm.variables compatibility read path are both read-only for CSV/JSON row data\n• Prefer pm.iterationData.get('userId') in scripts and {{userId}} in requests\n• Example: use {{baseUrl}}/users in URL, Bearer {{token}} in headers, and pm.iterationData.get('userId') in scripts
