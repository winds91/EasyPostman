csv.dialog.description=CSV data driven testing allows you to execute tests once for each row of data from an external data file.\n• The first row of the CSV file should contain column headers\n• Currently only standard comma-separated CSV (,) is supported\n• File import supports standard quoted CSV fields. For example, a single Cookie column can be written as: Cookie, then on the next line "a=1; b=2"\n• If a field contains commas or quotes, wrap it in double quotes; escape quotes inside the field as two double quotes\n• Supports three usage methods:\n  1. Use {{column_name}} placeholders directly in request URL, Headers, Body\n  2. Read the current row in scripts with pm.iterationData.get('column_name') (recommended, read-only)\n  3. Continue using pm.variables.get('column_name') for read-only compatibility access to the current row\n• Supported encoding: UTF-8
