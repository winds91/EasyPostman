performance.efficient_mode.tooltip.html=<b>✅ Features:</b><br>• Only records errors, saves 90%+ memory<br>• Ideal for high concurrency/long-duration tests<br><br><b>🎯 Recommended for:</b><br>• 100+ concurrent threads<br>• 10+ minute tests<br>• 1000+ iterations<br><br><b style='color: #ff6600;'>⚠️ Risks of disabling:</b><br>• 10x memory usage increase<br>• Potential application crashes
performance.efficient_mode.disable.warning=⚠️ Are you sure you want to disable Efficient Mode?\n\n🚨 Warning:\nDisabling efficient mode in performance testing may cause:\n• High memory consumption (10x or more)\n• Potential out-of-memory errors\n• Application crashes during high-load tests\n• Inaccurate performance metrics\n\n📊 Impact:\n• Each request result consumes ~1-5KB memory\n• 10,000 requests = 10-50MB memory usage\n• 100,000 requests = 100-500MB+ memory usage\n\n💡 Recommendation:\nKeep Efficient Mode ENABLED for reliable performance testing.\n\n🔧 If you need more memory, modify the config file:\n• macOS: Right-click EasyPostman.app → Show Package Contents → Contents/app/EasyPostman.cfg\n  Find [JavaOptions] section, modify -Xmx parameter\n• Windows/Linux: Find app/EasyPostman.cfg in installation directory\nExample: -Xmx4g (set max 4GB memory)\n\n❓ Do you really want to disable it?
performance.efficient_mode.warning.title=High Concurrency Warning
performance.efficient_mode.warning.msg=⚠️ You are configuring high concurrency testing without Efficient Mode!\n\n📊 Current Configuration:\n• Total estimated requests: {0}\n• Efficient Mode: Disabled\n\n💡 Recommendation:\nFor performance testing, it is STRONGLY RECOMMENDED to enable Efficient Mode to:\n• Reduce memory usage by 90%+\n• Prevent out-of-memory errors\n• Focus on performance metrics, not individual results\n\n🔧 If memory is insufficient, modify JVM memory parameters:\n• macOS: Right-click EasyPostman.app → Show Package Contents → Contents/app/EasyPostman.cfg\n  Add: -Xmx4g (set max 4GB memory)\n• Windows Portable: EasyPostman/app/EasyPostman.cfg\n• Windows Installer: Installation directory/app/EasyPostman.cfg\n• Linux: /opt/EasyPostman/lib/app/EasyPostman.cfg\n\n🤔 Do you want to enable Efficient Mode now?
