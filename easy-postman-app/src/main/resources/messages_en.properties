performance.csv.usage_note=• In performance testing, CSV data is bound to virtual users: the same thread keeps using the same row for the whole test instead of switching rows on every request\n• If concurrent users exceed CSV rows, rows will be reused cyclically, so account-like datasets should have at least as many rows as concurrent users\n• Multiple Thread Groups are useful for simulating different user populations or business phases in parallel, such as “guest browsing + logged-in checkout” or “read traffic + write traffic” at the same time\n• Multiple Thread Groups currently share the same CSV data pool; if each Thread Group needs its own account set, split the CSV files or extend this later with per-group isolation
