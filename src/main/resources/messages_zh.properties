script.help.title=💡 脚本使用指南
script.help.intro=Pre-script 在请求发送前执行，Post-script 在收到响应后执行。使用 JavaScript 编写脚本，支持变量操作、断言测试等功能。
script.help.features=✨ 主要功能：\n\n📝 自动补全（Tab 触发）\n  • 输入 pm. 后按 Tab 键，快速补全 API 方法\n  • 输入关键词后按 Tab，自动提示可用方法\n  • 悬停查看详细说明和参数\n\n📚 代码片段（Snippets）\n  • 点击右下角「代码片段」按钮\n  • 按分类浏览常用代码模板\n  • 双击或按回车插入代码\n  • 支持搜索功能，快速定位\n\n🔧 核心 API：\n  • pm.environment - 环境变量管理\n  • pm.variables - 临时变量\n  • pm.request - 请求对象（Pre-script）\n  • pm.response - 响应对象（Post-script）\n  • pm.test / pm.expect - 断言测试\n  • pm.cookies - Cookie 管理\n  • pm.kafka / pm.redis / pm.es - 中间件查询与断言\n\n📦 内置库：\n  • CryptoJS - 加密库（AES、MD5、SHA256等）\n  • Lodash (_) - 实用工具库\n  • Moment - 日期时间处理\n
script.help.shortcuts=⌨️ 快捷键：\n\n  Tab           触发自动补全\n  Ctrl/Cmd+S    保存请求\n  Ctrl/Cmd+/    注释/取消注释\n  Ctrl/Cmd+D    删除当前行\n
script.help.examples=📖 常用示例：\n\n1. 设置环境变量\n   pm.environment.set('token', 'abc123');\n\n2. 获取响应数据\n   var data = pm.response.json();\n   pm.environment.set('userId', data.id);\n\n3. 断言测试\n   pm.test('状态码是 200', function() {\n       pm.response.to.have.status(200);\n   });\n\n4. 动态添加请求头\n   pm.request.headers.add({\n       key: 'Authorization',\n       value: 'Bearer ' + pm.environment.get('token')\n   });\n\n5. 生成签名\n   var timestamp = Date.now();\n   var sign = CryptoJS.MD5(timestamp + 'secret').toString();\n   pm.environment.set('sign', sign);\n\n6. Redis 查询断言\n   var v = pm.redis.execute({host:'localhost',port:6379,db:0,command:'GET',key:'user:1'});\n   pm.test('redis 存在', function(){ pm.expect(v).to.exist(); });\n\n7. Kafka 查询断言\n   var records = pm.kafka.poll({bootstrapServers:'localhost:9092',topic:'demo-topic',pollTimeoutMs:1000});\n   pm.test('kafka 有消息', function(){ pm.expect(records.length).to.be.above(0); });\n\n8. Elasticsearch 查询断言\n   var esResp = pm.es.request({baseUrl:'http://localhost:9200',method:'GET',path:'/orders/_search',body:JSON.stringify({query:{match_all:{}},size:1})});\n   pm.test('es 状态码 200', function(){ pm.expect(esResp.code).to.equal(200); });\n
