performance.efficient_mode.tooltip.html=<b>✅ 功能说明：</b><br>• 仅记录错误结果，节省 90%+ 内存<br>• 适合高并发/长时间性能测试<br><br><b>🎯 推荐场景：</b><br>• 100+ 并发线程<br>• 10+ 分钟长时间测试<br>• 1000+ 次循环迭代<br><br><b style='color: #ff6600;'>⚠️ 关闭风险：</b><br>• 内存占用激增 10 倍以上<br>• 可能导致应用崩溃
performance.efficient_mode.disable.warning=⚠️ 您确定要关闭高效模式吗？\n\n🚨 警告：\n在性能测试中关闭高效模式可能导致：\n• 内存占用激增（10倍以上）\n• 可能发生内存溢出错误\n• 高负载测试时应用崩溃\n• 性能指标不准确\n\n📊 影响评估：\n• 每个请求结果占用约 1-5KB 内存\n• 10,000 次请求 = 10-50MB 内存占用\n• 100,000 次请求 = 100-500MB+ 内存占用\n\n💡 建议：\n保持高效模式开启，以确保可靠的性能测试。\n\n🔧 如果需要更大内存，可修改配置文件：\n• macOS: 右键 EasyPostman.app → 显示包内容 → Contents/app/EasyPostman.cfg\n  找到 [JavaOptions] 部分，修改 -Xmx 参数\n• Windows/Linux: 找到安装目录下的 app/EasyPostman.cfg 文件\n示例: -Xmx4g (设置最大4GB内存)\n\n❓ 您真的要关闭吗？
performance.efficient_mode.warning.title=高并发警告
performance.efficient_mode.warning.msg=⚠️ 您正在配置高并发测试，但未开启高效模式！\n\n📊 当前配置：\n• 预计总请求数：{0}\n• 高效模式：未开启\n\n💡 建议：\n对于性能测试，强烈建议开启高效模式，以便：\n• 减少90%+的内存占用\n• 避免内存溢出错误\n• 专注于性能指标，而非单个结果详情\n\n🔧 如果内存不足，可修改 JVM 内存参数：\n• macOS: 右键 EasyPostman.app → 显示包内容 → Contents/app/EasyPostman.cfg\n  添加: -Xmx4g (设置最大4GB内存)\n• Windows 绿色版: EasyPostman/app/EasyPostman.cfg\n• Windows 安装版: 安装目录/app/EasyPostman.cfg\n• Linux: /opt/EasyPostman/lib/app/EasyPostman.cfg\n\n🤔 是否现在开启高效模式？
