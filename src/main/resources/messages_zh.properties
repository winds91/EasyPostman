performance.csv.usage_note=• 在性能测试中，CSV 会按虚拟用户绑定：同一个线程在整个测试期间始终使用同一行数据，而不是每次请求都切换到下一行\n• 如果并发用户数大于 CSV 行数，会按行数循环复用，因此账号类数据请确保行数不少于并发用户数\n• 多 Thread Group 适合模拟不同用户群或不同业务阶段并行压测，例如“游客浏览 + 登录用户下单”或“读流量 + 写流量”同时压测\n• 当前多个 Thread Group 共享同一份 CSV 数据池；如果需要每个 Thread Group 使用独立账号集，建议拆分 CSV 或后续扩展为按组隔离
